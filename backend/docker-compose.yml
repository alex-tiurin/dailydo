version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dailydo-postgres
    environment:
      POSTGRES_DB: dailydo
      POSTGRES_USER: dailydo
      POSTGRES_PASSWORD: dailydo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailydo -d dailydo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
